<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClass - Gossip & Image</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff; color: #000; overflow: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .chat-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .bubble-me { background-color: #0095f6; color: white; border-bottom-right-radius: 4px; }
        .bubble-them { background-color: #efefef; color: black; border-bottom-left-radius: 4px; }
        .online-indicator { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }
        .is-online { background-color: #4ade80; }
        .is-offline { background-color: #94a3b8; }
        .story-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc23b0 75%, #bc1888 100%); padding: 2px; border-radius: 50%; }
        .rel-bar-bg { height: 4px; width: 100%; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .rel-bar-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div id="app-root" class="max-w-md mx-auto h-screen shadow-2xl relative flex flex-col border-x">
    
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-4 text-[#0095f6]">InstaClass</h1>
        <p class="text-xs font-bold text-gray-400 mb-8 uppercase tracking-widest">Wähle dein Profil</p>
        <div class="w-full space-y-2 overflow-y-auto max-h-[70vh] px-4 hide-scroll border rounded-2xl p-2 bg-gray-50" id="login-list"></div>
    </div>

    <!-- HEADER -->
    <header class="border-b px-4 py-3 flex justify-between items-center z-50 sticky top-0 bg-white">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">InstaClass</h1>
            <div id="user-reputation" class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter"></div>
        </div>
        <div class="flex items-center gap-4">
            <span id="global-online-count" class="text-[10px] font-bold text-green-500 uppercase">● 0 Online</span>
            <button onclick="openDMs()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 1 1 1-7.6-10.6 8.38 8.38 0 0 1 3.9.9L21 3.5l-1.5 5.5Z"/></svg></button>
        </div>
    </header>

    <!-- FEED -->
    <main id="main-scroll" class="flex-1 overflow-y-auto hide-scroll pb-20">
        <div class="flex gap-4 p-4 overflow-x-auto hide-scroll border-b border-gray-100">
            <div id="stories-list" class="flex gap-4"></div>
        </div>
        <div id="feed-container" class="divide-y divide-gray-100"></div>
    </main>

    <!-- NAV -->
    <nav class="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around py-4 z-50">
        <button onclick="showHome()" class="p-2 text-gray-800"><svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
        <button onclick="openPostModal()" class="p-2 text-gray-800"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></button>
        <button onclick="logout()" class="w-8 h-8 rounded-full border overflow-hidden">
            <img id="nav-avatar-img" src="" class="w-full h-full object-cover">
        </button>
    </nav>

    <!-- DM VIEW -->
    <div id="dm-view" class="hidden fixed inset-0 z-[100] bg-white flex flex-col max-w-md mx-auto border-x">
        <header class="px-4 py-4 border-b flex items-center gap-4">
            <button onclick="closeDMs()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
            <h2 class="text-xl font-bold">Direktnachrichten</h2>
        </header>
        <div id="dm-list" class="flex-1 overflow-y-auto hide-scroll"></div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" class="hidden fixed inset-0 z-[200] bg-white flex flex-col max-w-md mx-auto border-x">
        <header class="px-4 py-3 border-b flex items-center justify-between bg-white z-10 shadow-sm">
            <div class="flex items-center gap-3 overflow-hidden flex-1">
                <button onclick="closeChat()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
                <div class="relative">
                    <img id="chat-header-img" src="" class="w-9 h-9 rounded-full border object-cover">
                    <div id="chat-header-online" class="online-indicator is-offline"></div>
                </div>
                <div class="truncate flex-1">
                    <div class="flex items-center justify-between pr-2">
                        <h3 id="chat-header-name" class="font-bold text-sm truncate">Name</h3>
                        <span id="chat-rel-val" class="text-[9px] font-black text-gray-400">50%</span>
                    </div>
                    <div class="rel-bar-bg"><div id="chat-rel-bar" class="rel-bar-fill bg-blue-500" style="width: 50%;"></div></div>
                </div>
            </div>
        </header>
        <div id="chat-msgs" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-gray-50/50"></div>
        <div id="typing-indicator" class="hidden px-6 py-2 text-[10px] italic text-gray-400 font-bold uppercase tracking-wider">Tippt...</div>
        <div id="chat-input-area" class="p-4 border-t flex gap-2 bg-white">
            <input type="text" id="chat-input" placeholder="Nachricht an die Klasse..." class="flex-1 bg-gray-100 p-3 rounded-2xl outline-none text-sm">
            <button id="send-btn" onclick="sendMessage()" class="text-[#0095f6] font-bold px-2">Senden</button>
        </div>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="hidden fixed inset-0 z-[500] bg-black/60 flex items-end">
        <div class="w-full bg-white rounded-t-[24px] p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">Neuer Post</h3>
                <button onclick="closePostModal()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <textarea id="post-input" placeholder="Teile Gossip oder ein Update..." class="w-full h-24 p-4 bg-gray-50 rounded-xl border text-sm mb-4"></textarea>
            <button id="publish-btn" onclick="createNewPost()" class="w-full bg-[#0095f6] text-white py-4 rounded-xl font-bold">Veröffentlichen</button>
        </div>
    </div>
</div>

<script>
    // Config for GitHub Pages Deployment
    const apiKey = "AIzaSyAjARcxPPzrSs7v22qYFW2hLRpb6i2hqOg"; 
    const MODEL_ID = "gemini-2.5-flash-preview-09-2025";
    const DB_SEED_URL = "https://api.dicebear.com/7.x/avataaars/svg?seed=";

    const KLASSE = {
        "Adriana S.": { seed: "Adriana", bio: "Arrogant, Moncler-Brille. Liebt Partys & Parallelklasse.", style: "Snobby, herablassend.", friends: ["Nila", "Eileen", "Helena", "Cedric", "Max", "Leif"], hates: ["William", "Tim", "Elisa", "Anna G.", "Anna P."] },
        "Anna G.": { seed: "AnnaG", bio: "Trinkt Alkohol, Vergangenheit mit Konsum. Sehr offen, lacht oft, schlechte Noten.", style: "Direkt, offen, sympathisch.", friends: ["Anna P.", "Tim", "Leif", "Max", "Jacob"], hates: ["Adriana S.", "William", "Cedric"] },
        "Anna P.": { seed: "AnnaP", bio: "Beste Freundin von Anna G. Wohnt in Küsnacht, spielt Tennis, 15 Jahre alt.", style: "Sympathisch, offen, direkt.", friends: ["Anna G.", "Tim", "Alex Z.", "Lino", "Jacob", "Max", "Leif", "Nick", "Sämi", "Valerie"], hates: [] },
        "Cedric": { seed: "Cedric", bio: "Liebt GCZ. Trägt grüne Adidas Jacke. Steht auf Emmanuel Schmucki.", style: "Defensiv, keine echten Freunde.", friends: ["Luc", "Sean", "Adriana S.", "Eileen", "Helena", "Nila", "Tim-Oliver"], hates: ["Leif", "Tim"] },
        "Eileen": { seed: "Eileen", bio: "Küsnacht. Austausch Costa-Rica. Blonde Haare, 16, humorvoll.", style: "Humorvoll, lacht viel.", friends: ["Luc", "Sean", "Cedric", "Adriana S.", "Nila", "Helena", "Mila", "Paulina"], hates: ["William"] },
        "Elin": { seed: "Elin", bio: "Vater hat Apotheke, 2 Hunde (Clooney). Wohnt in Zollikon, 175cm.", style: "Gepflegt, ruhig.", friends: ["Zofia", "Elisa", "Emma", "Tim", "William", "Jacob", "Lily-Marie", "Julia"], hates: ["Adriana S."] },
        "Elisa": { seed: "Elisa", bio: "Romandie-Austausch. Tratschtante aus Thalwil.", style: "Nett, redet viel.", friends: ["Tim", "William", "Elin", "Zofia", "Emma", "Jacob", "Lily-Marie", "Julia"], hates: ["Cedric", "Adriana S.", "William"] },
        "Emma": { seed: "Emma", bio: "Aus Schweden, FCZ-Fan. Freund: Max.", style: "Direkt, abenteuerlustig.", friends: ["Tim", "William", "Elin", "Zofia", "Lily-Marie", "Anna P.", "Anna G.", "Julia"], hates: ["Cedric"] },
        "Helena": { seed: "Helena", bio: "Reich (Tina Turner Haus Nachbar). Lipsync Tiktok.", style: "Arrogant, reich, teils nett.", friends: ["Adriana S.", "Nila", "Eileen", "Mila", "Paulina", "Cedric", "Luc", "Sean"], hates: ["William", "Lily-Marie"] },
        "Jacob": { seed: "Jacob", bio: "Introvertierter Deutscher. Nikin-Fan. Kinoabende.", style: "Nett, introvertiert.", friends: ["William", "Tim-Oliver", "Tim", "Leif", "Anna G.", "Anna P."], hates: ["Max"] },
        "Jara": { seed: "Jara", bio: "Austausch Australien. Mag Roblox.", style: "Introvertiert.", friends: ["Anna G.", "Anna P.", "Leif", "Tim", "Jacob"], hates: ["Cedric", "Adriana S."] },
        "Julia": { seed: "Julia", bio: "Meilen, 15. Mag Pferde & Ballett.", style: "Ruhig, introvertiert.", friends: ["Elisa", "Elin", "Emma", "Zofia", "Lily-Marie", "William", "Tim"], hates: [] },
        "Leif": { seed: "Leif", bio: "Fluffy Hair. Musik & Anime. Tschechien-Kleidung.", style: "Egozentrisch, arrogant.", friends: ["Tim", "Max", "Jacob", "Anna P.", "Anna G.", "Cedric", "Elias"], hates: ["Cedric", "Adriana S."] },
        "Lily-Marie": { seed: "LilyMarie", bio: "Österreicherin, Streberin. St. Anton Skifahren.", style: "Hilfsbereit, teils arrogant.", friends: ["Zofia", "Emma", "Elin", "Elisa", "Tim", "William", "Julia"], hates: [] },
        "Luc": { seed: "Luc", bio: "Austausch USA. Blackpillmogger. Macho.", style: "Macho, extrovertiert.", friends: ["Sean", "Adriana S.", "Eileen", "Nila", "Helena", "Cedric"], hates: [] },
        "Max": { seed: "Max", bio: "Gym-Fan, Freund von Emma. Alpha Industries.", style: "Gym-Physique, teils arrogant.", friends: ["Leif", "Tim", "Anna G.", "Anna P.", "Emma", "William"], hates: ["Cedric"] },
        "Nila": { seed: "Nila", bio: "Höflich, blonde Haare. Hasst Geschichte.", style: "Höflich, zuvorkommend.", friends: ["Adriana S.", "Eileen", "Helena", "Cedric", "Luc", "Sean"], hates: [] },
        "Sean": { seed: "Sean", bio: "Austausch Neuseeland. Trinkt gerne Bier.", style: "Extrovertiert, keck.", friends: ["Luc", "Cedric", "Nila", "Adriana S.", "Paulina", "Mila", "Theo"], hates: [] },
        "Tim-Oliver": { seed: "Toli", bio: "Esslingen. Hat Haus renoviert. Introvertiert.", style: "Asozial wirtend, eigentlich nett.", friends: ["Leif", "Jacob", "Tim"], hates: [] },
        "William": { seed: "William", bio: "Mongolei, humorvoll, respektvoll. Streber.", style: "Offen, respektvoll.", friends: ["Zofia", "Julia", "Lily-Marie", "Emma", "Elisa", "Elin", "Tim", "Leif", "Jacob", "Max", "Cedric"], hates: ["Adriana S."] },
        "Zofia": { seed: "Zofia", bio: "Spanischprofil, Streber-Tendenzen.", style: "Nett, offen.", friends: ["Julia", "Lily-Marie", "Emma", "Elisa", "Elin", "Tim", "William"], hates: [] },
        "Ellison": { seed: "Ellison", bio: "USA, Politisch. Kann fies & fake sein.", style: "Fake, fies.", friends: ["Adriana S.", "Eileen", "Nila", "Helena", "Cedric", "Luc", "Sean"], hates: ["William"] },
        "Tim": { seed: "TimItalo", bio: "Italiener. Läster-König. Hasst falsche Pasta.", style: "Starke Meinung, lästert viel.", friends: ["William", "Leif", "Anna G.", "Anna P.", "Jacob", "Max", "Tim-Oliver", "Elisa", "Lily-Marie", "Zofia", "Emma", "Julia", "Eileen", "Nila", "Jara"], hates: ["Cedric", "Adriana S."] }
    };

    let globalState = JSON.parse(localStorage.getItem('instaClass_v7')) || {
        feed: [],
        history: {},
        reputation: {}, 
        relationships: {}, 
        onlineStatus: {}
    };

    let currentUser = null;
    let activeChat = null;

    function save() { localStorage.setItem('instaClass_v7', JSON.stringify(globalState)); }

    async function fetchGemini(prompt) {
        // Updated URL construction
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`;
        const delays = [1000, 2000, 4000, 8000, 16000];
        
        for (let i = 0; i <= delays.length; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { 
                            responseMimeType: "application/json"
                        }
                    })
                });
                
                if (!response.ok) {
                    const errorBody = await response.text();
                    console.error("API Error Details:", errorBody);
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return JSON.parse(data.candidates[0].content.parts[0].text);
            } catch (err) {
                console.warn(`Retry ${i+1}...`, err);
                if (i === delays.length) return null;
                await new Promise(r => setTimeout(r, delays[i]));
            }
        }
    }

    function getRep(name) { return globalState.reputation[name] || 50; }
    function setRep(name, delta) { 
        globalState.reputation[name] = Math.max(0, Math.min(100, getRep(name) + delta));
        save();
        if (currentUser === name) updateHeader();
    }

    function getRel(name) { 
        const key = [currentUser, name].sort().join('_');
        if (globalState.relationships[key] === undefined) {
            globalState.relationships[key] = 50;
            save();
        }
        return globalState.relationships[key]; 
    }

    function setRel(name, delta) {
        const key = [currentUser, name].sort().join('_');
        globalState.relationships[key] = Math.max(0, Math.min(100, getRel(name) + delta));
        save();
        if (activeChat === name) updateChatHeaderRel();
    }

    function updateHeader() {
        if (!currentUser) return;
        const rep = getRep(currentUser);
        const rank = rep > 85 ? "Idol" : (rep > 65 ? "Beliebt" : (rep < 25 ? "Target" : "Normal"));
        document.getElementById('user-reputation').innerHTML = `★ ${rank} (${rep}%)`;
    }

    function initLogin() {
        const list = document.getElementById('login-list');
        list.innerHTML = Object.keys(KLASSE).sort().map(name => `
            <button onclick="login('${name}')" class="w-full flex items-center justify-between p-4 bg-white border rounded-xl hover:bg-gray-50 active:scale-95 transition">
                <div class="flex items-center gap-3">
                    <img src="${DB_SEED_URL + KLASSE[name].seed}" class="w-10 h-10 rounded-full border">
                    <span class="font-bold text-sm">${name}</span>
                </div>
                <span class="text-[10px] font-black text-blue-500">${getRep(name)}%</span>
            </button>
        `).join('');
    }

    function login(name) {
        currentUser = name;
        document.getElementById('nav-avatar-img').src = DB_SEED_URL + KLASSE[name].seed;
        document.getElementById('login-screen').classList.add('hidden');
        updateHeader(); renderStories(); renderFeed();
    }

    function logout() { currentUser = null; document.getElementById('login-screen').classList.remove('hidden'); }

    function openChat(name) {
        activeChat = name;
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('chat-header-name').innerText = name;
        document.getElementById('chat-header-img').src = DB_SEED_URL + KLASSE[name].seed;
        updateChatHeaderRel(); renderMessages();
    }

    function updateChatHeaderRel() {
        if (!activeChat) return;
        const val = getRel(activeChat);
        document.getElementById('chat-rel-val').innerText = val + "%";
        document.getElementById('chat-rel-bar').style.width = val + "%";
    }

    function renderMessages() {
        const key = [currentUser, activeChat].sort().join('_');
        const msgs = globalState.history[key] || [];
        document.getElementById('chat-msgs').innerHTML = msgs.map(m => `
            <div class="flex flex-col ${m.sender === currentUser ? 'items-end' : 'items-start'}">
                <div class="chat-bubble ${m.sender === currentUser ? 'bubble-me' : 'bubble-them'}">${m.text}</div>
            </div>
        `).join('');
        document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !activeChat) return;
        const key = [currentUser, activeChat].sort().join('_');
        if (!globalState.history[key]) globalState.history[key] = [];
        globalState.history[key].push({ sender: currentUser, text });
        input.value = ""; renderMessages();
        
        document.getElementById('typing-indicator').classList.remove('hidden');
        const prompt = `Antworte als ${activeChat} (${KLASSE[activeChat].style}) auf ${currentUser}: "${text}". JSON: {"reply": "...", "relChange": -5..5, "repChange": -2..2}`;
        const data = await fetchGemini(prompt);
        if (data) {
            globalState.history[key].push({ sender: activeChat, text: data.reply });
            if (data.relChange) setRel(activeChat, data.relChange);
            if (data.repChange) setRep(currentUser, data.repChange);
            save(); renderMessages();
        }
        document.getElementById('typing-indicator').classList.add('hidden');
    }

    function renderStories() {
        document.getElementById('stories-list').innerHTML = Object.keys(KLASSE).filter(k => k !== currentUser).map(k => `
            <div onclick="openChat('${k}')" class="flex flex-col items-center gap-1 flex-shrink-0 cursor-pointer">
                <div class="story-ring p-0.5 rounded-full bg-gradient-to-tr from-yellow-400 to-pink-600">
                    <img src="${DB_SEED_URL + KLASSE[k].seed}" class="w-12 h-12 rounded-full border-2 border-white">
                </div>
                <span class="text-[9px] font-bold">${k.split(' ')[0]}</span>
            </div>
        `).join('');
    }

    function renderFeed() {
        document.getElementById('feed-container').innerHTML = globalState.feed.slice().reverse().map(p => `
            <div class="p-4 border-b">
                <div class="flex items-center gap-2 mb-2">
                    <img src="${DB_SEED_URL + KLASSE[p.user]?.seed}" class="w-6 h-6 rounded-full border">
                    <span class="font-bold text-xs">${p.user}</span>
                </div>
                <p class="text-sm">${p.text}</p>
            </div>
        `).join('') || '<p class="p-10 text-center text-gray-400">Keine Posts</p>';
    }

    function openDMs() {
        document.getElementById('dm-view').classList.remove('hidden');
        document.getElementById('dm-list').innerHTML = Object.keys(KLASSE).filter(k => k !== currentUser).map(k => `
            <div onclick="openChat('${k}')" class="p-4 border-b flex items-center gap-3 hover:bg-gray-50">
                <img src="${DB_SEED_URL + KLASSE[k].seed}" class="w-12 h-12 rounded-full border">
                <div class="flex-1">
                    <div class="flex justify-between font-bold text-sm"><span>${k}</span><span>${getRel(k)}%</span></div>
                    <div class="rel-bar-bg"><div class="rel-bar-fill bg-blue-500" style="width:${getRel(k)}%"></div></div>
                </div>
            </div>
        `).join('');
    }

    function closeDMs() { document.getElementById('dm-view').classList.add('hidden'); }
    function closeChat() { document.getElementById('chat-view').classList.add('hidden'); activeChat = null; }
    function showHome() { closeChat(); closeDMs(); }
    function openPostModal() { document.getElementById('post-modal').classList.remove('hidden'); }
    function closePostModal() { document.getElementById('post-modal').classList.add('hidden'); }

    async function createNewPost() {
        const text = document.getElementById('post-input').value.trim();
        if (!text) return;
        globalState.feed.push({ user: currentUser, text });
        save(); renderFeed(); closePostModal();
        const prompt = `Post von ${currentUser}: "${text}". Wie reagiert die Klasse? JSON: {"repDelta": -5..5, "comment": "...", "author": "Name"}`;
        const data = await fetchGemini(prompt);
        if (data) {
            setRep(currentUser, data.repDelta);
            if (data.comment) {
                setTimeout(() => {
                    globalState.feed.push({ user: data.author, text: data.comment });
                    save(); renderFeed();
                }, 1500);
            }
        }
    }

    window.onload = initLogin;
</script>
</body>
</html>
