<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClass - Gossip & Image</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#0095f6',
                    }
                }
            }
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark body { background-color: #050505; color: #fff; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        .chat-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; position: relative; transition: all 0.2s ease; }
        .bubble-me { background: linear-gradient(135deg, #0095f6, #0077c2); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0, 149, 246, 0.2); }
        .bubble-them { background-color: #efefef; color: black; border-bottom-left-radius: 4px; }
        .dark .bubble-them { background-color: #262626; color: white; }
        
        .online-indicator { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }
        .dark .online-indicator { border-color: #000; }
        .is-online { background-color: #4ade80; }
        .is-offline { background-color: #94a3b8; }
        
        .story-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc23b0 75%, #bc1888 100%); padding: 2px; border-radius: 50%; }
        .rel-bar-bg { height: 4px; width: 100%; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .dark .rel-bar-bg { background: #333; }
        .rel-bar-fill { height: 100%; transition: width 0.5s ease-in-out; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body>

<div id="app-root" class="max-w-md mx-auto h-screen shadow-2xl relative flex flex-col border-x dark:border-zinc-800 bg-white dark:bg-black overflow-hidden">
    
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[1000] bg-white dark:bg-black flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-4 text-[#0095f6] drop-shadow-sm">InstaClass</h1>
        <p class="text-xs font-bold text-gray-400 dark:text-zinc-500 mb-8 uppercase tracking-widest">Wähle dein Profil</p>
        <div class="w-full space-y-2 overflow-y-auto max-h-[70vh] px-4 hide-scroll border dark:border-zinc-800 rounded-2xl p-2 bg-gray-50 dark:bg-zinc-900/50" id="login-list"></div>
    </div>

    <!-- HEADER -->
    <header class="border-b dark:border-zinc-800 px-4 py-3 flex justify-between items-center z-50 sticky top-0 glass">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black italic tracking-tighter cursor-pointer flex items-center" onclick="location.reload()">InstaClass <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded ml-2 not-italic">BETA</span></h1>
            <div id="user-reputation" class="text-[10px] font-bold text-gray-400 dark:text-zinc-500 uppercase tracking-tighter"></div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="openLeaderboard()" class="text-xl mr-2 hover:scale-110 transition">🏆</button>
            <span id="global-online-count" class="text-[10px] font-bold text-green-500 uppercase">● Live</span>
            <button onclick="openDMs()" class="hover:text-brand transition"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 1 1 1-7.6-10.6 8.38 8.38 0 0 1 3.9.9L21 3.5l-1.5 5.5Z"/></svg></button>
        </div>
    </header>

    <!-- FEED -->
    <main id="main-scroll" class="flex-1 overflow-y-auto hide-scroll pb-20">
        <div class="flex gap-4 p-4 overflow-x-auto hide-scroll border-b border-gray-100">
            <div id="stories-list" class="flex gap-4"></div>
        </div>
        <div id="feed-container" class="divide-y divide-gray-100"></div>
    </main>

    <!-- NAV -->
    <nav class="fixed bottom-0 w-full max-w-md border-t dark:border-zinc-800 flex justify-around py-4 z-50 glass">
        <button onclick="showHome()" class="p-2 text-gray-800 dark:text-zinc-200 hover:text-brand transition"><svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
        <button onclick="openPostModal()" class="p-2 text-gray-800 dark:text-zinc-200 hover:text-brand transition"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></button>
        <button onclick="logoutOrSettings()" class="w-8 h-8 rounded-full border dark:border-zinc-700 overflow-hidden hover:scale-110 transition">
            <img id="nav-avatar-img" src="" class="w-full h-full object-cover">
        </button>
    </nav>

    <!-- DM VIEW -->
    <div id="dm-view" class="hidden fixed inset-0 z-[100] bg-white dark:bg-black flex flex-col max-w-md mx-auto border-x dark:border-zinc-800">
        <header class="px-4 py-4 border-b dark:border-zinc-800 flex items-center gap-4 glass">
            <button onclick="closeDMs()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
            <h2 class="text-xl font-bold">Direktnachrichten</h2>
        </header>
        <div id="dm-list" class="flex-1 overflow-y-auto hide-scroll"></div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" class="hidden fixed inset-0 z-[200] bg-white dark:bg-black flex flex-col max-w-md mx-auto border-x dark:border-zinc-800">
        <header class="px-4 py-3 border-b dark:border-zinc-800 flex items-center justify-between z-10 glass">
            <div class="flex items-center gap-3 overflow-hidden flex-1">
                <button onclick="closeChat()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
                <div class="relative">
                    <img id="chat-header-img" src="" class="w-9 h-9 rounded-full border dark:border-zinc-700 object-cover">
                    <div id="chat-header-online" class="online-indicator is-offline"></div>
                </div>
                <div class="truncate flex-1">
                    <div class="flex items-center justify-between pr-2">
                        <h3 id="chat-header-name" class="font-bold text-sm truncate">Name</h3>
                        <span id="chat-rel-val" class="text-[9px] font-black text-gray-400 dark:text-zinc-500">50%</span>
                    </div>
                    <div class="rel-bar-bg"><div id="chat-rel-bar" class="rel-bar-fill bg-blue-500" style="width: 50%;"></div></div>
                </div>
            </div>
        </header>
        <div id="chat-msgs" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-gray-50/50 dark:bg-zinc-900/30"></div>
        <div id="typing-indicator" class="hidden px-6 py-2 text-[10px] italic text-gray-400 font-bold uppercase tracking-wider">Tippt...</div>
        <div id="chat-input-area" class="p-4 border-t dark:border-zinc-800 flex items-center gap-2 bg-white dark:bg-black">
            <button onclick="simulateImageUpload()" class="p-2 text-gray-400 hover:text-brand transition">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="text" id="chat-input" placeholder="Nachricht an die Klasse..." class="flex-1 bg-gray-100 dark:bg-zinc-900 dark:text-white p-3 rounded-2xl outline-none text-sm transition-all focus:ring-1 focus:ring-brand">
            <button id="send-btn" onclick="sendMessage()" class="text-brand font-bold px-2 hover:opacity-80 transition">Senden</button>
        </div>
    </div>

    <!-- LEADERBOARD MODAL -->
    <div id="leaderboard-modal" class="hidden fixed inset-0 z-[500] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="w-full bg-white dark:bg-zinc-900 rounded-2xl p-6 max-h-[80vh] flex flex-col shadow-2xl animate-fade-in">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl dark:text-white">🏆 Beliebtheits-Ranking</h3>
                <button onclick="closeLeaderboard()" class="p-1 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-full transition"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div id="leaderboard-list" class="flex-1 overflow-y-auto hide-scroll space-y-2"></div>
        </div>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="hidden fixed inset-0 z-[500] bg-black/60 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white dark:bg-zinc-900 rounded-t-[24px] p-6 shadow-2xl animate-fade-in">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold dark:text-white">Neuer Post</h3>
                <button onclick="closePostModal()" class="p-1 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-full transition"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <textarea id="post-input" placeholder="Teile Gossip oder ein Update..." class="w-full h-24 p-4 bg-gray-50 dark:bg-zinc-800 dark:text-white rounded-xl border dark:border-zinc-700 text-sm mb-4 outline-none focus:ring-1 focus:ring-brand"></textarea>
            <button id="publish-btn" onclick="createNewPost()" class="w-full bg-[#0095f6] hover:bg-[#0077c2] text-white py-4 rounded-xl font-bold transition">Veröffentlichen</button>
        </div>
    </div>
</div>

<script>
    const DB_SEED_URL = "https://api.dicebear.com/7.x/avataaars/svg?seed=";
    // Die Charakterinformationen (Bio, Style) sind nun extrem sicher ins Vercel Backend verschoben! (Dadurch 100% versteckt und unsichtbar für Inspect Element!)
    const KLASSE = {
        "Adriana S.": { seed: "Adriana", friends: ["Nila", "Eileen", "Helena", "Cedric", "Max", "Leif"], hates: ["William", "Tim", "Elisa", "Anna G.", "Anna P."] },
        "Anna G.": { seed: "AnnaG", friends: ["Anna P.", "Tim", "Leif", "Max", "Jacob"], hates: ["Adriana S.", "William", "Cedric"] },
        "Anna P.": { seed: "AnnaP", friends: ["Anna G.", "Tim", "Alex Z.", "Lino", "Jacob", "Max", "Leif", "Nick", "Sämi", "Valerie"], hates: [] },
        "Cedric": { seed: "Cedric", friends: ["Tim-Oliver", "Adriana S.", "Eileen", "Helena", "Nila", "Luc", "Sean"], hates: ["Leif", "Tim"] },
        "Eileen": { seed: "Eileen", friends: ["Luc", "Sean", "Cedric", "Adriana S.", "Nila", "Helena", "Mila", "Paulina"], hates: ["William"] },
        "Elin": { seed: "Elin", friends: ["Zofia", "Elisa", "Emma", "Tim", "William", "Jacob", "Lily-Marie", "Julia"], hates: ["Adriana S."] },
        "Elisa": { seed: "Elisa", friends: ["Tim", "William", "Elin", "Zofia", "Emma", "Jacob", "Lily-Marie", "Julia"], hates: ["Cedric", "Adriana S.", "William"] },
        "Emma": { seed: "Emma", friends: ["Tim", "William", "Elin", "Zofia", "Lily-Marie", "Anna P.", "Anna G.", "Julia"], hates: ["Cedric"] },
        "Helena": { seed: "Helena", friends: ["Adriana S.", "Nila", "Eileen", "Mila", "Paulina", "Cedric", "Luc", "Sean"], hates: ["William", "Lily-Marie"] },
        "Jacob": { seed: "Jacob", friends: ["William", "Tim-Oliver", "Tim", "Leif", "Anna G.", "Anna P."], hates: ["Max"] },
        "Jara": { seed: "Jara", friends: ["Anna G.", "Anna P.", "Leif", "Tim", "Jacob"], hates: ["Cedric", "Adriana S."] },
        "Julia": { seed: "Julia", friends: ["Elisa", "Elin", "Emma", "Zofia", "Lily-Marie", "William", "Tim"], hates: [] },
        "Leif": { seed: "Leif", friends: ["Tim", "Max", "Jacob", "Anna P.", "Anna G.", "Cedric", "Elias"], hates: ["Cedric", "Wangchuk", "Adriana S."] },
        "Lily-Marie": { seed: "LilyMarie", friends: ["Zofia", "Emma", "Elin", "Elisa", "Tim", "William", "Julia"], hates: [] },
        "Luc": { seed: "Luc", friends: ["Sean", "Adriana S.", "Eileen", "Nila", "Helena", "Cedric"], hates: [] },
        "Max": { seed: "Max", friends: ["Leif", "Tim", "Anna G.", "Anna P.", "Emma", "William", "Cedric"], hates: ["Cedric"] },
        "Nila": { seed: "Nila", friends: ["Adriana S.", "Eileen", "Helena", "Cedric", "Luc", "Sean"], hates: [] },
        "Sean": { seed: "Sean", friends: ["Luc", "Cedric", "Nila", "Adriana S.", "Paulina", "Mila", "Theo", "Francesco T."], hates: [] },
        "Tim-Oliver": { seed: "Toli", friends: ["Leif", "Jacob", "Tim"], hates: [] },
        "William": { seed: "William", friends: ["Zofia", "Julia", "Lily-Marie", "Emma", "Elisa", "Elin", "Tim", "Leif", "Jacob", "Max", "Cedric"], hates: ["Adriana S."] },
        "Zofia": { seed: "Zofia", friends: ["Julia", "Lily-Marie", "Emma", "Elisa", "Elin", "Tim", "William"], hates: [] },
        "Ellison": { seed: "Ellison", friends: ["Adriana S.", "Eileen", "Nila", "Helena", "Cedric", "Luc", "Sean"], hates: ["William"] },
        "Tim": { seed: "TimItalo", friends: ["William", "Leif", "Anna G.", "Anna P.", "Jacob", "Max", "Tim-Oliver", "Elisa", "Lily-Marie", "Zofia", "Emma", "Julia", "Eileen", "Nila", "Jara"], hates: ["Cedric", "Adriana S."] }
    };

    let globalState = JSON.parse(localStorage.getItem('instaClass_v7')) || {
        feed: [],
        history: {},
        reputation: {}, 
        relationships: {}, 
        onlineStatus: {}
    };

    let currentUser = null;
    let activeChat = null;

    const firebaseConfig = {
        apiKey: "AIzaSyDY5r1B4BT3DtcsJewIjsiReytjLB8HSTE",
        authDomain: "instaclass-63401.firebaseapp.com",
        projectId: "instaclass-63401",
        storageBucket: "instaclass-63401.firebasestorage.app",
        messagingSenderId: "241379471845",
        appId: "1:241379471845:web:bffa9f80fdc7e48359bf0c",
        measurementId: "G-DVJ3MY8PW2"
    };
    
    let db = null;
    let useFirebase = false;
    
    try {
        if (firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            useFirebase = true;
            
            // Listen to real-time updates from everyone!
            db.collection("InstaClassGame").doc("globalState").onSnapshot(doc => {
                if (doc.exists) {
                    globalState = doc.data();
                    if (currentUser) {
                        updateHeader();
                        renderStories();
                        renderFeed();
                        if (activeChat) {
                            updateChatHeaderRel();
                            renderMessages();
                        }
                        if (!document.getElementById('leaderboard-modal').classList.contains('hidden')) {
                            renderLeaderboard();
                        }
                    }
                }
            });
        }
    } catch(e) { console.error("Firebase init fallback:", e); }

    function save() { 
        const cleanState = JSON.parse(JSON.stringify(globalState));
        localStorage.setItem('instaClass_v7', JSON.stringify(cleanState)); 
        if (useFirebase && db) {
            db.collection("InstaClassGame").doc("globalState")
              .set(cleanState)
              .catch(console.error);
        }
    }

    function openLeaderboard() {
        document.getElementById('leaderboard-modal').classList.remove('hidden');
        renderLeaderboard();
    }
    
    function closeLeaderboard() {
        document.getElementById('leaderboard-modal').classList.add('hidden');
    }

    function renderLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        const sorted = Object.keys(KLASSE).sort((a,b) => getRep(b) - getRep(a));
        
        list.innerHTML = sorted.map((name, i) => {
            const isMe = name === currentUser;
            return `
            <div class="flex items-center gap-3 p-3 rounded-xl border dark:border-zinc-800 ${isMe ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800' : 'bg-gray-50 dark:bg-zinc-800/50'}">
                <span class="font-black text-gray-400 dark:text-zinc-600 w-4">${i+1}.</span>
                <img src="${DB_SEED_URL + KLASSE[name]?.seed}" class="w-8 h-8 rounded-full border dark:border-zinc-700 bg-white">
                <span class="font-bold text-sm flex-1 ${isMe ? 'text-blue-600 dark:text-blue-400' : 'dark:text-zinc-200'}">${name}</span>
                <span class="font-black text-[#0095f6]">${getRep(name)}%</span>
            </div>
            `;
        }).join('');
    }

    async function fetchGemini(payload) {
        const delays = [500, 1500, 3000]; // Optimized delays
        
        for (let i = 0; i <= delays.length; i++) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                if (i === delays.length) return null;
                await new Promise(r => setTimeout(r, delays[i]));
            }
        }
    }

    function getRep(name) { return globalState.reputation[name] || 50; }
    function setRep(name, delta) { 
        globalState.reputation[name] = Math.max(0, Math.min(100, getRep(name) + delta));
        save();
        if (currentUser === name) updateHeader();
    }

    function getChatKey(user1, user2) {
        return [user1, user2].sort().join('_');
    }

    function getRel(name) { 
        const key = getChatKey(currentUser, name);
        if (globalState.relationships[key] === undefined) {
            let start = 40; // Default: Bekannte
            if (KLASSE[currentUser]?.friends?.includes(name)) start += 25;
            if (KLASSE[currentUser]?.hates?.includes(name)) start -= 30;
            if (KLASSE[name]?.friends?.includes(currentUser)) start += 25;
            if (KLASSE[name]?.hates?.includes(currentUser)) start -= 30;
            globalState.relationships[key] = Math.max(0, Math.min(100, start));
            save();
        }
        return globalState.relationships[key]; 
    }

    function setRel(name, delta) {
        const key = getChatKey(currentUser, name);
        globalState.relationships[key] = Math.max(0, Math.min(100, getRel(name) + delta));
        save();
        if (activeChat === name) updateChatHeaderRel();
    }

    function getRelLevelInfo(val) {
        if (val < 20) return { name: "Feinde 💔", color: "bg-red-500", progress: (val / 20) * 100 };
        if (val < 40) return { name: "Unsympathisch 🧊", color: "bg-orange-500", progress: ((val - 20) / 20) * 100 };
        if (val < 60) return { name: "Bekannte 👋", color: "bg-gray-400", progress: ((val - 40) / 20) * 100 };
        if (val < 80) return { name: "Freunde 🤝", color: "bg-blue-500", progress: ((val - 60) / 20) * 100 };
        if (val < 100) return { name: "Enge Freunde ❤️", color: "bg-purple-500", progress: ((val - 80) / 20) * 100 };
        return { name: "Besties ✨", color: "bg-pink-500", progress: 100 };
    }

    function updateHeader() {
        if (!currentUser) return;
        const rep = getRep(currentUser);
        const rank = rep > 85 ? "Idol" : (rep > 65 ? "Beliebt" : (rep < 25 ? "Target" : "Normal"));
        document.getElementById('user-reputation').innerHTML = `★ ${rank} (${rep}%)`;
    }

    function initLogin() {
        if (globalState.darkMode) document.documentElement.classList.add('dark');
        const list = document.getElementById('login-list');
        list.innerHTML = Object.keys(KLASSE).sort().map(name => `
            <button onclick="login('${name}')" class="w-full flex items-center justify-between p-4 bg-white dark:bg-zinc-800/50 border dark:border-zinc-800 rounded-xl hover:bg-gray-50 dark:hover:bg-zinc-800 active:scale-95 transition">
                <div class="flex items-center gap-3">
                    <img src="${DB_SEED_URL + KLASSE[name].seed}" class="w-10 h-10 rounded-full border dark:border-zinc-700">
                    <span class="font-bold text-sm dark:text-zinc-200">${name}</span>
                </div>
                <span class="text-[10px] font-black text-blue-500">${getRep(name)}%</span>
            </button>
        `).join('');
    }

    function login(name) {
        if (!globalState.passwords) globalState.passwords = {};
        const savedPass = globalState.passwords[name];
        
        const entered = prompt(`Willkommen, ${name}!\nWir benötigen dein Konto-Passwort:\n(Lass das Feld leer, um jetzt ein neues zu setzen, falls du keins hast!)`);
        if (entered === null) return; 
        
        if (!savedPass) {
            if (entered.trim() === "") {
                alert("Fehler: Du musst beim allerersten Login zwingend ein Passwort eingeben!");
                return;
            }
            globalState.passwords[name] = entered;
            save(); 
            alert(`Konto geschützt! Dein Passwort für ${name} ist jetzt festgesetzt.`);
        } else if (savedPass !== entered) {
            alert("Falsches Passwort! Zugriff verweigert.");
            return;
        }

        currentUser = name;
        document.getElementById('nav-avatar-img').src = DB_SEED_URL + KLASSE[name].seed;
        document.getElementById('login-screen').classList.add('hidden');
        updateHeader(); renderStories(); renderFeed();
    }

    function logoutOrSettings() {
        const choice = prompt("Konto-Optionen:\n1) Passwort ändern\n2) Dark-Mode umschalten\n3) Ausloggen\n\nTippe 1, 2 oder 3 und drücke OK:");
        if (choice === "1") {
            const currentPass = prompt("Sicherheitsprüfung: Gib dein aktuelles Passwort ein:");
            if (currentPass === globalState.passwords[currentUser]) {
                const newPass = prompt("Gib dein neues, sicheres Passwort ein:");
                if (newPass) {
                    globalState.passwords[currentUser] = newPass;
                    save();
                    alert("Wunderbar! Dein Passwort wurde erfolgreich in der Cloud geändert.");
                } else {
                    alert("Abgebrochen. Passwort bleibt gleich.");
                }
            } else alert("Falsches Passwort eingegeben! Aktion abgebrochen.");
        } else if (choice === "2") {
            globalState.darkMode = !globalState.darkMode;
            document.documentElement.classList.toggle('dark');
            save();
        } else if (choice === "3") {
            currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
        }
    }

    function openChat(name) {
        activeChat = name;
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('chat-header-name').innerText = name;
        document.getElementById('chat-header-img').src = DB_SEED_URL + KLASSE[name].seed;
        updateChatHeaderRel(); renderMessages();
    }

    function updateChatHeaderRel() {
        if (!activeChat) return;
        const val = getRel(activeChat);
        const level = getRelLevelInfo(val);
        document.getElementById('chat-rel-val').innerText = `${level.name} - ${Math.round(level.progress)}% zum Level Up`;
        document.getElementById('chat-rel-bar').className = `rel-bar-fill ${level.color}`;
        document.getElementById('chat-rel-bar').style.width = level.progress + "%";
    }

    function renderMessages() {
        const key = getChatKey(currentUser, activeChat);
        const history = globalState.history[key] || [];
        
        const container = document.getElementById('chat-msgs');
        if (!container) return;

        container.innerHTML = history.map(msg => {
            const isMe = msg.from === currentUser;
            
            let statusIcon = "";
            if (isMe && msg.status) {
                if (msg.status === "sent") statusIcon = `<svg class="w-3.5 h-3.5 text-blue-200 inline ml-1.5 opacity-60 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
                if (msg.status === "delivered") statusIcon = `<svg class="w-4 h-4 text-blue-200 inline ml-1.5 opacity-60 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12l5 5L20 7"></path><path stroke-linecap="round" stroke-linejoin="round" d="M4 17l5-5"></path></svg>`;
                if (msg.status === "read") statusIcon = `<svg class="w-4 h-4 text-white inline ml-1.5 drop-shadow-md flex-shrink-0" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12l5 5L20 7"></path><path stroke-linecap="round" stroke-linejoin="round" d="M4 17l5-5"></path></svg>`;
            }

            let content = `<span>${msg.text}</span>`;
            if (msg.image) {
                content = `<div class="flex flex-col gap-2">
                    <img src="${msg.image}" class="rounded-lg max-w-full h-auto border dark:border-zinc-700 shadow-sm cursor-zoom-in" onclick="window.open('${msg.image}')">
                    ${msg.text ? `<span class="text-xs opacity-90">${msg.text}</span>` : ''}
                </div>`;
            }

            return `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-3 animate-fade-in">
                    <span class="text-[10px] text-gray-400 dark:text-zinc-600 font-bold ml-2 mb-1 uppercase tracking-tighter">${msg.from}</span>
                    <div class="${isMe ? 'bubble-me text-white' : 'bubble-them dark:bg-zinc-800 dark:text-zinc-200 text-black'} px-4 py-2.5 rounded-2xl max-w-[85%] shadow-sm text-sm flex items-end">
                        ${content} ${statusIcon}
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function simulateImageUpload() {
        if (!activeChat) return;
        const url = prompt("Gib eine Bild-URL ein (z.B. von Pinterest oder Google):", "https://picsum.photos/400/300");
        if (!url) return;

        const key = getChatKey(currentUser, activeChat);
        if (!globalState.history[key]) globalState.history[key] = [];
        
        const msgRef = { 
            from: currentUser, 
            text: "", 
            image: url,
            status: "sent", 
            id: Date.now() 
        };
        
        globalState.history[key].push(msgRef);
        save(); renderMessages();
        
        // Let the bot respond to the image!
        setTimeout(() => {
            handleBotResponse("Schau mal das hier!", url);
        }, 1000);
    }

    async function handleBotResponse(customText, imageUrl = null) {
        const botName = activeChat;
        const rel = getRel(botName);
        const key = getChatKey(currentUser, activeChat);

        // Update status for the last message
        const h = globalState.history[key];
        if (h && h.length > 0 && h[h.length - 1].from === currentUser) {
            h[h.length - 1].status = "read";
            save(); renderMessages();
        }

        const payload = {
            type: "chat",
            botName: botName,
            currentUser: currentUser,
            userText: imageUrl ? `[IMAGE: ${imageUrl}] ${customText}` : customText,
            rel: rel,
            learnedTraits: globalState.learnedTraits[botName] || [],
            currentUserTraits: globalState.learnedTraits[currentUser] || []
        };

        const typingInd = document.getElementById('typing-indicator');
        if (typingInd) typingInd.classList.remove('hidden');
        
        const data = await fetchGemini(payload);
        
        if (typingInd) typingInd.classList.add('hidden');

        if (data && data.reply) {
            if (data.delta) setRel(botName, data.delta);
            if (data.learnedFact) {
                if (!globalState.learnedTraits[currentUser]) globalState.learnedTraits[currentUser] = [];
                if (globalState.learnedTraits[currentUser].length >= 10) globalState.learnedTraits[currentUser].shift();
                globalState.learnedTraits[currentUser].push(data.learnedFact);
            }
            globalState.history[key].push({ from: botName, text: data.reply });
            save(); renderMessages();
        }
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const userText = input.value.trim();
        if (!userText || !activeChat) return;
        
        const key = getChatKey(currentUser, activeChat);
        if (!globalState.history[key]) globalState.history[key] = [];
        if (!globalState.learnedTraits) globalState.learnedTraits = {};
        
        const botName = activeChat;
        const rel = getRel(botName);
        
        const msgRef = { from: currentUser, text: userText, status: "sent", id: Date.now() };
        globalState.history[key].push(msgRef);
        save(); renderMessages();
        input.value = '';
        
        function updateLastMsgStatus(newStatus) {
            const h = globalState.history[key];
            if (h && h.length > 0 && h[h.length - 1].from === currentUser) {
                h[h.length - 1].status = newStatus;
                save(); renderMessages();
            }
        }

        // 1. Delivery delay
        await delay(Math.random() * 800 + 400); 
        updateLastMsgStatus("delivered");

        // 2. Ghosting check
        if (rel < 20 && Math.random() < 0.3) return; // Ghosted

        // 3. Reading delay
        let readDelay = 800 + Math.random() * 2000;
        if (rel < 40) readDelay += 2000 + Math.random() * 4000; 
        await delay(readDelay);

        updateLastMsgStatus("read");

        // 4. Left on read check
        if (rel < 30 && Math.random() < 0.4) return;

        // 5. Build secure Backend-Payload (The logic runs hidden on the server)
        const payload = {
            type: "chat",
            botName: botName,
            currentUser: currentUser,
            userText: userText,
            rel: rel,
            learnedTraits: globalState.learnedTraits[botName] || [],
            currentUserTraits: globalState.learnedTraits[currentUser] || []
        };

        const typingInd = document.getElementById('typing-indicator');
        if (typingInd) typingInd.classList.remove('hidden');
        
        const data = await fetchGemini(payload);
        
        if (typingInd) typingInd.classList.add('hidden');

        if (data && data.reply) {
            if (data.delta) setRel(botName, data.delta);
            
            // Save newly learned fact about the currentUser
            if (data.learnedFact) {
                if (!globalState.learnedTraits[currentUser]) globalState.learnedTraits[currentUser] = [];
                // Only save up to 10 latest facts
                if (globalState.learnedTraits[currentUser].length >= 10) {
                    globalState.learnedTraits[currentUser].shift(); // Remove oldest
                }
                globalState.learnedTraits[currentUser].push(data.learnedFact);
            }

            globalState.history[key].push({ from: botName, text: data.reply });
            save(); renderMessages();
        }
    }
    function renderStories() {
        document.getElementById('stories-list').innerHTML = Object.keys(KLASSE).filter(k => k !== currentUser).map(k => `
            <div onclick="openChat('${k}')" class="flex flex-col items-center gap-1 flex-shrink-0 cursor-pointer">
                <div class="story-ring p-0.5 rounded-full bg-gradient-to-tr from-yellow-400 to-pink-600">
                    <img src="${DB_SEED_URL + KLASSE[k].seed}" class="w-12 h-12 rounded-full border-2 border-white">
                </div>
                <span class="text-[9px] font-bold">${k.split(' ')[0]}</span>
            </div>
        `).join('');
    }

    function renderFeed() {
        document.getElementById('feed-container').innerHTML = globalState.feed.slice().reverse().map((p, index) => {
            const originalIndex = globalState.feed.length - 1 - index;
            const likesCount = p.likes?.length || 0;
            const commentsHtml = (p.comments || []).map(c => `
                <div class="text-xs mt-1 bg-gray-50 dark:bg-zinc-800/50 p-2 rounded-lg ml-8 relative border-l-2 border-blue-400 dark:text-zinc-300">
                    <span class="font-bold text-blue-500">${c.user}:</span> ${c.text}
                </div>
            `).join('');

            return `
            <div class="p-4 border-b dark:border-zinc-800 animate-fade-in" style="animation-delay: ${index * 0.05}s">
                <div class="flex items-center gap-2 mb-2">
                    <img src="${DB_SEED_URL + KLASSE[p.user]?.seed}" class="w-6 h-6 rounded-full border dark:border-zinc-700 bg-white">
                    <span class="font-bold text-xs dark:text-zinc-200">${p.user}</span>
                </div>
                <p class="text-sm font-medium dark:text-zinc-100">${p.text}</p>
                
                <div class="flex items-center gap-4 mt-3 mb-2 text-gray-400 dark:text-zinc-500">
                    <button onclick="likePost(${originalIndex})" class="flex items-center gap-1.5 text-xs hover:text-red-500 transition-colors ${p.likes?.includes(currentUser) ? 'text-red-500' : ''}">
                        <svg width="18" height="18" fill="${p.likes?.includes(currentUser) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span class="font-bold">${likesCount}</span>
                    </button>
                    <button onclick="writeComment(${originalIndex})" class="flex items-center gap-1.5 text-xs hover:text-blue-500 transition-colors">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        <span class="font-bold">Chat</span>
                    </button>
                </div>
                ${commentsHtml}
            </div>
            `;
        }).join('') || '<p class="p-10 text-center text-gray-400 dark:text-zinc-600 font-bold uppercase text-xs">Der Feed ist leer. Poste als Erster!</p>';
    }

    function likePost(index) {
        if (!globalState.feed[index].likes) globalState.feed[index].likes = [];
        const likes = globalState.feed[index].likes;
        if (likes.includes(currentUser)) {
            globalState.feed[index].likes = likes.filter(u => u !== currentUser);
        } else {
            likes.push(currentUser);
        }
        save();
        renderFeed();
    }

    function writeComment(index) {
        const text = prompt("Dein Kommentar zu diesem Beitrag:");
        if (!text) return;
        if (!globalState.feed[index].comments) globalState.feed[index].comments = [];
        globalState.feed[index].comments.push({ user: currentUser, text });
        save();
        renderFeed();
    }

    function openDMs() {
        document.getElementById('dm-view').classList.remove('hidden');
        document.getElementById('dm-list').innerHTML = Object.keys(KLASSE).filter(k => k !== currentUser).map(k => {
            const val = getRel(k);
            const level = getRelLevelInfo(val);
            return `
            <div onclick="openChat('${k}')" class="p-4 border-b dark:border-zinc-800 flex items-center gap-3 hover:bg-gray-50 dark:hover:bg-zinc-900 cursor-pointer transition">
                <img src="${DB_SEED_URL + KLASSE[k].seed}" class="w-12 h-12 rounded-full border dark:border-zinc-700">
                <div class="flex-1">
                    <div class="flex justify-between font-bold text-sm">
                        <span class="dark:text-zinc-200">${k}</span>
                        <span class="text-[10px] text-gray-400 dark:text-zinc-500 font-bold">${level.name} (${val}%)</span>
                    </div>
                    <div class="rel-bar-bg"><div class="rel-bar-fill ${level.color}" style="width:${level.progress}%"></div></div>
                </div>
            </div>
            `;
        }).join('');
    }

    function closeDMs() { document.getElementById('dm-view').classList.add('hidden'); }
    function closeChat() { document.getElementById('chat-view').classList.add('hidden'); activeChat = null; }
    function showHome() { closeChat(); closeDMs(); }
    function openPostModal() { document.getElementById('post-modal').classList.remove('hidden'); }
    function closePostModal() { document.getElementById('post-modal').classList.add('hidden'); }

    async function createNewPost() {
        const text = document.getElementById('post-input').value.trim();
        if (!text) return;
        
        const newPost = { user: currentUser, text, likes: [], comments: [] };
        globalState.feed.push(newPost);
        const postIndex = globalState.feed.length - 1;
        save(); renderFeed(); closePostModal();
        
        const friendsStr = KLASSE[currentUser]?.friends?.join(', ') || '';
        const payload = {
            type: "feed",
            currentUser: currentUser,
            userText: text,
            rel: getRep(currentUser),
            friendsStr: friendsStr
        };
        
        const data = await fetchGemini(payload);
        if (data) {
            setRep(currentUser, data.repDelta || 0);
            if (data.likes && Array.isArray(data.likes)) {
                globalState.feed[postIndex].likes = data.likes;
            }
            if (data.comments && Array.isArray(data.comments)) {
                globalState.feed[postIndex].comments = data.comments;
            }
            save(); renderFeed();
        }
    }

    window.onload = initLogin;
</script>
</body>
